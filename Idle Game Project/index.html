<!DOTYPE html>
<html>
	<head>
		<link rel="stylesheet" type="text/css" href="./interface.css" />
		<title>Idle Time Traveler</title>
		  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-D2B0SHYXD7"></script>
  <script>
    /* Global site tag (gtag.js) - Google Analytics */
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag("js", new Date());
    gtag("config", "G-D2B0SHYXD7");
  </script>
	</head>
	<body>
		<h1>Idle Time Traveler</h1>
		
		<!-- Scrap Gathering -->
		<section id="scrapGathering">
			<p><button onclick="gatherScrap(1)">Gather Scrap</button></p>
			<p><span id="scrap">0</span> Scrap Metal (<span id="scrap/s">0</span> scrap/s)</p>
		</section>
		
		<!-- Magnet Carts -->
		<section id="magnetCartsSection" class="hidden">
			<p><button onclick="buyCart()" id="cartCreator" disabled>Create Magnet Cart | <span id="cartCost">10</span> Scrap Metal</button>
			<br>
			Magnet Carts: <span id="cartAmount">0</span> (<span id="cartGen/s">0</span> scrap/s)</p>
		</section>
		
		<!-- Rust Collectors -->
		<section id="rustCollectorSection" class="hidden">
			<p><button onclick="buyCollector()" id="collectorCreator" disabled>Create Rust Collector | <span id="collectorCost">0</span> Magnet Carts</button><br>
			Rust Collectors: <span id="collectorAmount">0</span> (<span id="collectorGen/s">0</span> scrap/s)</p>
		</section>
		
		<!-- Save Section -->
		<section id="saveManager">
			<button onclick="deleteSave()" class="red">Delete Save</button>
		
		<script type="text/javascript" src="./main.js"></script>
	</body>
</html>
